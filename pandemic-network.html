<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pandemic Alert Network — OSI Layers</title>
  <style>
/* ─────────────────────────────────────────
   Pandemic Alert Network — Stylesheet
   ───────────────────────────────────────── */

:root {
  --bg-primary:    #0d1117;
  --bg-secondary:  #161b22;
  --bg-tertiary:   #21262d;
  --border:        rgba(255,255,255,0.1);
  --border-strong: rgba(255,255,255,0.2);
  --text-primary:  #e6edf3;
  --text-secondary:#8b949e;
  --text-tertiary: #484f58;
  --green:         #1D9E75;
  --green-light:   #E1F5EE;
  --green-dark:    #0A2E1E;
  --blue:          #185FA5;
  --blue-light:    #E6F1FB;
  --blue-dark:     #042C53;
  --amber:         #BA7517;
  --amber-light:   #FAEEDA;
  --red:           #E24B4A;
  --red-light:     #FCEBEB;
  --radius-md:     8px;
  --radius-lg:     12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

#app {
  max-width: 900px;
  margin: 0 auto;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--bg-secondary);
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg-primary);
}
.header-title {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: .01em;
}
.header-icon { font-size: 18px; }
.header-status { display: flex; align-items: center; gap: 8px; margin-left: auto; }

.status-dot {
  width: 9px; height: 9px; border-radius: 50%;
  animation: pulse 1.6s ease-in-out infinite;
}
.status-dot.active   { background: var(--green); }
.status-dot.outbreak { background: var(--red); }

.status-label { font-size: 12px; font-weight: 600; letter-spacing: .06em; }
.status-label.live     { color: var(--green); }
.status-label.outbreak { color: var(--red); }

/* ── Tabs ── */
.tab-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px 14px 8px;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg-secondary);
}
.tab-btn {
  font-size: 12px;
  font-family: inherit;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 6px;
  border: 0.5px solid var(--border-strong);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
}
.tab-btn:hover  { background: var(--bg-tertiary); color: var(--text-primary); }
.tab-btn.active { background: var(--bg-tertiary); color: var(--text-primary); border-color: rgba(255,255,255,0.35); }
.tab-btn.danger { color: var(--red); border-color: var(--red); }
.tab-btn.danger:hover { background: rgba(226,75,74,0.12); }
.tab-btn.danger.active-outbreak { background: rgba(226,75,74,0.2); }

/* ── Canvas ── */
.canvas-wrapper {
  background: #070d0a;
  border-bottom: 0.5px solid var(--border);
  line-height: 0;
}
#netCanvas { display: block; width: 100%; }

/* SVG text classes */
.layer-label {
  font-size: 9px;
  font-weight: 600;
  fill: #1D9E75;
  opacity: 0.6;
  font-family: 'Courier New', monospace;
  letter-spacing: .05em;
}
.domain-label {
  font-size: 9px;
  font-weight: 600;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
.domain-label.green { fill: #1D9E75; }
.domain-label.blue  { fill: #185FA5; }
.domain-label.amber { fill: #BA7517; }

.node-title {
  font-size: 10px;
  font-weight: 700;
  fill: #1D9E75;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
.node-sub {
  font-size: 7.5px;
  fill: #0F6E56;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

.node-group { cursor: pointer; }
.node-group:hover .node-ring { opacity: 0.9 !important; transition: opacity .15s; }

/* ── Stats Bar ── */
.stats-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 8px 14px;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg-primary);
}
.stat-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-secondary);
  padding: 4px 10px;
  border-radius: 20px;
  border: 0.5px solid var(--border);
  background: var(--bg-secondary);
}
.stat-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.stat-dot.green { background: var(--green); }
.stat-dot.blue  { background: var(--blue); }
.stat-dot.red   { background: var(--red); }
.stat-dot.amber { background: var(--amber); }

/* ── Alert Log ── */
#alertLog {
  height: 96px;
  overflow-y: auto;
  padding: 6px 14px;
  border-bottom: 0.5px solid var(--border);
  background: #050d0a;
  font-size: 11.5px;
  font-family: 'Courier New', monospace;
  color: var(--text-secondary);
  line-height: 1.85;
  scroll-behavior: smooth;
}
#alertLog::-webkit-scrollbar { width: 4px; }
#alertLog::-webkit-scrollbar-track { background: transparent; }
#alertLog::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

.log-entry { display: flex; gap: 10px; }
.log-time  { color: var(--text-tertiary); min-width: 58px; flex-shrink: 0; }
.log-crit  { color: #F09595; }
.log-warn  { color: #FAC775; }
.log-info  { color: #85B7EB; }

/* ── Controls ── */
.ctrl-bar {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg-secondary);
}
.ctrl-label { font-size: 12px; color: var(--text-secondary); }

input[type="range"] {
  -webkit-appearance: none;
  width: 90px; height: 4px;
  background: var(--border-strong);
  border-radius: 2px; cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--green);
  border: 2px solid var(--bg-primary);
}
input[type="range"]::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--green);
  border: 2px solid var(--bg-primary);
}

select {
  font-size: 12px;
  font-family: inherit;
  padding: 5px 8px;
  border-radius: var(--radius-md);
  border: 0.5px solid var(--border-strong);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  cursor: pointer;
}

/* ── Tooltip ── */
.tooltip {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 999;
  background: var(--bg-secondary);
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  max-width: 280px;
  width: 90%;
  box-shadow: 0 0 0 1px var(--border);
}
.tooltip.hidden { display: none; }
.tt-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  display: inline-block;
  margin-bottom: 6px;
  letter-spacing: .04em;
}
.tt-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.tt-body  {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 12px;
  white-space: pre-line;
  font-family: 'Courier New', monospace;
}
.tt-close {
  font-size: 11px; font-family: inherit; cursor: pointer;
  background: var(--bg-tertiary); color: var(--text-secondary);
  border: 0.5px solid var(--border); border-radius: 6px;
  padding: 4px 10px; width: 100%;
  transition: background .15s;
}
.tt-close:hover { background: var(--border); color: var(--text-primary); }

/* ── Animations ── */
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(1.15); }
}

/* ── Responsive ── */
@media (max-width: 600px) {
  .tab-row { gap: 4px; }
  .tab-btn { font-size: 11px; padding: 4px 9px; }
  .stats-bar { gap: 5px; }
  .stat-pill { font-size: 11px; padding: 3px 8px; }
  select { font-size: 11px; }
}
  </style>
</head>
<body>
  <div id="app">

    <!-- Header -->
    <div class="header">
      <div class="header-title">
        <span class="header-icon">🌐</span>
        Pandemic / Epidemic Alert Network
      </div>
      <div class="header-status">
        <span id="statusDot" class="status-dot active"></span>
        <span id="statusLabel" class="status-label live">LIVE</span>

    </div>

    <!-- Layer tabs -->
    <div class="tab-row">
      <button class="tab-btn active" onclick="setLayer('all')">All Layers</button>
      <button class="tab-btn" onclick="setLayer('L3')">L3 Network</button>
      <button class="tab-btn" onclick="setLayer('L2')">L2 Data Link</button>

      <button class="tab-btn danger" onclick="triggerOutbreak()" id="outbreakBtn">⚡ Simulate Outbreak</button>
      <button class="tab-btn" onclick="togglePause()" id="pauseBtn">⏸ Pause</button>
    </div>

    <!-- SVG Canvas -->
    <div class="canvas-wrapper">
      <svg id="netCanvas" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

            <feGaussianBlur stdDeviation="4" result="blur"/>

          </filter>
          <pattern id="circuitGrid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1D9E75" stroke-width="0.3" opacity="0.4"/>
          </pattern>
          <pattern id="circuitDots" width="20" height="20" patternUnits="userSpaceOnUse">

          </pattern>

            <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round"/>
          </marker>
        </defs>

        <!-- L1 Physical Layer -->
        <g id="layerL1">
          <rect x="0" y="0" width="680" height="480" fill="url(#circuitGrid)"/>
          <rect x="0" y="0" width="680" height="480" fill="url(#circuitDots)"/>
          <g stroke-width="1" fill="none" opacity="0.3">
            <line x1="340" y1="50" x2="340" y2="430" stroke="#1D9E75"/>
            <line x1="30"  y1="240" x2="650" y2="240" stroke="#1D9E75"/>

            <line x1="30"  y1="360" x2="650" y2="360" stroke="#0F6E56" stroke-dasharray="2 6"/>
          </g>
          <text class="layer-label" x="8" y="12">L1 PHYSICAL — fiber / wireless / satellite</text>
        </g>

        <!-- L2 Data Link Layer -->
        <g id="layerL2">
          <rect x="268" y="28" width="144" height="76" rx="8" fill="none" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="5 3" opacity="0.7"/>
          <text class="domain-label green" x="340" y="24" text-anchor="middle">WHO backbone (MAC domain)</text>

          <rect x="58"  y="110" width="144" height="76" rx="8" fill="none" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="5 3" opacity="0.6"/>
          <text class="domain-label blue" x="130" y="106" text-anchor="middle">Hospital LAN N</text>

          <rect x="478" y="110" width="144" height="76" rx="8" fill="none" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="5 3" opacity="0.6"/>

          <text class="domain-label amber" x="125" y="276" text-anchor="middle">Clinic cluster W</text>

          <line x1="340" y1="95"  x2="340" y2="148" stroke="#1D9E75" marker-end="url(#arrowG)"/>
          <line x1="340" y1="95"  x2="550" y2="148" stroke="#1D9E75" marker-end="url(#arrowG)"/>
          <line x1="130" y1="185" x2="100" y2="280" stroke="#185FA5" stroke-dasharray="4 2" marker-end="url(#arrowN)"/>
          <line x1="130" y1="185" x2="270" y2="380" stroke="#185FA5" stroke-dasharray="4 2" marker-end="url(#arrowN)"/>

        <!-- Hospital nodes injected by JS -->
        <g id="hospitals"></g>

        <!-- Clinic nodes injected by JS -->

        <!-- Packet animation layer — must be LAST so packets paint on top of all nodes -->
        <g id="packetLayer"></g>
      </svg>
    </div>

    <!-- Stats bar — all 8 metrics that network.js actually writes -->
    <div class="stats-bar">
      <div class="stat-pill green">
        <span class="stat-dot green"></span>

      <div class="stat-pill blue">
        <span class="stat-dot blue"></span>
        Active: <span id="s-active">0</span>
      </div>
      <div class="stat-pill red">
        <span class="stat-dot red"></span>
        Latency <span id="s-latency">0ms</span>
      </div>
      <div class="stat-pill amber">
        <span class="stat-dot amber"></span>
        BW <span id="s-bw">0%</span>
      </div>
      <div class="stat-pill red">
        <span class="stat-dot red"></span>
        Loss <span id="s-loss">0%</span>
      </div>
      <div class="stat-pill amber">
        <span class="stat-dot amber"></span>
        Drops <span id="s-alerts">0</span>
      </div>
      <div class="stat-pill" style="color:var(--text-tertiary)">
        Congestion <span id="s-congestion">0%</span>
      </div>
      <div class="stat-pill" style="color:var(--text-tertiary)">
        Node util <span id="s-nodeutil">0%</span>
      </div>
    </div>

    <!-- Alert Log -->
    <div id="alertLog"></div>

    <!-- Controls — slider range 1-4 matches main.js SPEED_MAP {1:0.5, 2:1, 3:2, 4:3} -->
    <div class="ctrl-bar">
      <label class="ctrl-label">Packet speed:</label>
      <input type="range" id="speedCtrl" min="1" max="4" value="2"/>
      <label id="speedLabel" class="ctrl-label" style="min-width:52px">Normal</label>
      <label class="ctrl-label" style="margin-left:auto;">Layer focus:</label>
      <select id="layerSel" onchange="setLayer(this.value)">
        <option value="all">All layers</option>
        <option value="L3">L3 Network only</option>
        <option value="L2">L2 Data Link only</option>
        <option value="L1">L1 Physical only</option>
      </select>
    </div>
  </div>

  <!-- Node info tooltip -->
  <div id="tooltip" class="tooltip hidden">
    <div id="tt-badge" class="tt-badge"></div>
    <div id="tt-title" class="tt-title"></div>
    <div id="tt-body" class="tt-body"></div>
    <button onclick="document.getElementById('tooltip').classList.add('hidden')" class="tt-close">✕ Close</button>
  </div>

  <!-- packets.js                                                              -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <script>
'use strict';

class Packet {
  constructor({ id, source, destination, size, priority, type, createdAt, ttl }) {
    this.id          = id;
    this.source      = source;
    this.destination = destination;
    this.size        = size;
    this.priority    = priority;
    this.type        = type;
    this.createdAt   = createdAt;
    this.ttl         = ttl;

    this.routeHistory  = [];
    this.hopCount      = 0;
    this.currentNode   = source;
    this.currentLink   = null;
    this.progress      = 0;
    this.status        = 'QUEUED';

    this.x1 = 0; this.y1 = 0;
    this.x2 = 0; this.y2 = 0;
    this.color       = '#1D9E75';
    this.isEmergency = false;

    this.transitDuration    = 0;
    this.transitStart       = 0;
    this.queueEnteredAt     = createdAt;
    this.totalQueueWaitMs   = 0;
    this.deliveredAt        = 0;
  }

  get e2eLatencyMs() {
    return this.deliveredAt > 0
      ? this.deliveredAt - this.createdAt
      : performance.now() - this.createdAt;
  }
}

class PacketManager {
  constructor() {
    this.packets         = new Map();
    this.nextId          = 1;
    this._totalCreated   = 0;
    this._totalDelivered = 0;
    this._totalDropped   = 0;
    this._deliveryWindow = [];
    this._latencySamples = [];
    this._WINDOW_MS      = 5000;
  }

  createPacket(config) {
    const packet = new Packet({ id: this.nextId++, ...config });
    this.packets.set(packet.id, packet);
    this._totalCreated++;
    return packet;
  }

  deliver(id) {
    const p = this.packets.get(id);
    if (!p) return;
    p.deliveredAt = performance.now();
    p.status      = 'DELIVERED';
    this._totalDelivered++;
    this._deliveryWindow.push(p.deliveredAt);
    this._latencySamples.push({ ts: p.deliveredAt, latencyMs: p.e2eLatencyMs });
    this.packets.delete(id);
  }

  drop(id) {
    if (this.packets.has(id)) {
      this._totalDropped++;
      this.packets.delete(id);
    }
  }

  getPackets()     { return [...this.packets.values()]; }
  getActiveCount() { return this.packets.size; }

  getThroughput() {
    const now = performance.now();
    this._deliveryWindow = this._deliveryWindow.filter(t => now - t < this._WINDOW_MS);
    return this._deliveryWindow.length / (this._WINDOW_MS / 1000);
  }

  getAvgLatencyMs() {
    const now = performance.now();
    this._latencySamples = this._latencySamples.filter(s => now - s.ts < this._WINDOW_MS);
    if (this._latencySamples.length === 0) return 0;
    const sum = this._latencySamples.reduce((a, s) => a + s.latencyMs, 0);
    return sum / this._latencySamples.length;
  }

  getPacketLossRatio() {
    const total = this._totalDelivered + this._totalDropped;
    return total === 0 ? 0 : this._totalDropped / total;
  }

  getStats() {
    return {
      active:       this.packets.size,
      created:      this._totalCreated,
      delivered:    this._totalDelivered,
      dropped:      this._totalDropped,
      throughput:   this.getThroughput(),
      lossRatio:    this.getPacketLossRatio(),
      avgLatencyMs: this.getAvgLatencyMs(),
    };
  }
}

class PacketRenderer {
  constructor(layerId = 'packetLayer') { this.layerId = layerId; }

  _ease(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

  render(packetManager, linkManager, nodeManager) {
    const layer = document.getElementById(this.layerId);
    if (!layer) return;
    layer.innerHTML = '';

    for (const packet of packetManager.getPackets()) {
      if (packet.status !== 'IN_TRANSIT') continue;
      if (!packet.currentLink) continue;

      const link     = linkManager.getLink(packet.currentLink);
      if (!link) continue;

      const fromNode = nodeManager.getNode(link.from);
      const toNode   = nodeManager.getNode(link.to);
      if (!fromNode || !toNode) continue;

      const t  = this._ease(Math.min(packet.progress, 1));
      const cx = fromNode.x + (toNode.x - fromNode.x) * t;
      const cy = fromNode.y + (toNode.y - fromNode.y) * t;

      // Gentle fade: only in first 5% and last 5% of travel
      const raw     = packet.progress;
      const opacity = raw < 0.05 ? raw * 20 : raw > 0.95 ? (1 - raw) * 20 : 1;

      const isHigh = packet.priority === 'HIGH';
      // Bigger dots: 7px emergency, 5px normal (was 5.5 / 3.5)
      const r      = isHigh ? 7 : 5;
      const color  = packet.color || (isHigh ? '#E24B4A' : '#1D9E75');

      // Glow halo behind each packet for visibility
      const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      glow.setAttribute('cx', cx.toFixed(2));
      glow.setAttribute('cy', cy.toFixed(2));
      glow.setAttribute('r',  r + 4);
      glow.setAttribute('fill', color);
      glow.setAttribute('opacity', (opacity * 0.25).toFixed(3));
      layer.appendChild(glow);

      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', cx.toFixed(2));
      circle.setAttribute('cy', cy.toFixed(2));
      circle.setAttribute('r',  r);
      circle.setAttribute('fill', color);
      circle.setAttribute('opacity', opacity.toFixed(3));

      circle.setAttribute('filter', isHigh ? 'url(#glowStrong)' : 'url(#glow)');

      if (isHigh) {
        circle.setAttribute('stroke',         '#ffffff');
        circle.setAttribute('stroke-width',   '1.5');
        circle.setAttribute('stroke-opacity', '0.8');
      } else {
        circle.setAttribute('stroke',         '#ffffff');
        circle.setAttribute('stroke-width',   '0.8');
        circle.setAttribute('stroke-opacity', '0.4');
      }

      layer.appendChild(circle);
    }

    this._renderQueueHeat(nodeManager);
  }

  _renderQueueHeat(nodeManager) {
    for (const node of nodeManager.getAll()) {
      const grp = document.getElementById(node.id);
      if (!grp) continue;
      const fill = grp.querySelector('circle');
      if (!fill) continue;

      const depth = node.queue.length / node.maxQueueDepth;

      let strokeColor;
      if (depth < 0.4)      strokeColor = null;
      else if (depth < 0.7) strokeColor = '#BA7517';
      else                  strokeColor = '#E24B4A';

      if (strokeColor) {
        fill.setAttribute('stroke', strokeColor);
      } else {
        if (node.type === 'who')           fill.setAttribute('stroke', '#1D9E75');
        else if (node.type === 'hospital') fill.setAttribute('stroke', '#185FA5');
        else                               fill.setAttribute('stroke', '#BA7517');
      }
    }
  }
}

window.Packet         = Packet;
window.PacketManager  = PacketManager;
window.PacketRenderer = PacketRenderer;
  </script>

  <script>
'use strict';

class NodeEntity {
  constructor(id, x, y, type = 'clinic') {
    this.id   = id;
    this.x    = x;
    this.y    = y;
    this.type = type;

    this.queue         = [];
    this.maxQueueDepth = type === 'hospital' ? 40 : type === 'who' ? 0 : 20;

    this.processingRate  = type === 'hospital' ? 8 : type === 'who' ? 0 : 4;
    this.processingDelayPerPkt = this.processingRate > 0
      ? 1 / this.processingRate : 0;

    this.bandwidthCapacityBps  = type === 'hospital' ? 1_000_000 : 100_000;
    this._bytesForwardedWindow = [];
    this._BW_WINDOW_MS         = 5000;

    this.packetsProcessed = 0;
    this.packetsDropped   = 0;

    this.utilization        = 0;
    this.bandwidthUtilPct   = 0;

    this._busyTime   = 0;
    this._totalTime  = 0;
    this._processFrac = 0;
  }

  enqueue(packet) {
    if (this.queue.length >= this.maxQueueDepth) {
      this.packetsDropped++;
      return false;
    }
    packet.queueEnteredAt = performance.now();
    this.queue.push(packet);
    return true;
  }

  _drainByRate(deltaTime) {
    if (this.processingRate === 0) return [];
    this._processFrac += this.processingRate * deltaTime;
    const n = Math.floor(this._processFrac);
    this._processFrac -= n;
    const drained = [];
    for (let i = 0; i < n && this.queue.length > 0; i++) {
      const pkt = this.queue.shift();
      if (pkt.queueEnteredAt > 0) {
        pkt.totalQueueWaitMs += performance.now() - pkt.queueEnteredAt;
        pkt.queueEnteredAt    = 0;
      }
      drained.push(pkt);
    }
    return drained;
  }

  update(deltaTime, routingTable, linkManager, packetManager) {
    this._totalTime += deltaTime;
    if (this.queue.length > 0) this._busyTime += deltaTime;
    this.utilization = this._totalTime > 0
      ? Math.min(this._busyTime / this._totalTime, 1) : 0;

    const now = performance.now();
    this._bytesForwardedWindow = this._bytesForwardedWindow
      .filter(e => now - e.ts < this._BW_WINDOW_MS);
    const bytesInWindow = this._bytesForwardedWindow.reduce((a, e) => a + e.bytes, 0);
    const windowSec     = this._BW_WINDOW_MS / 1000;
    const bpsUsed       = bytesInWindow / windowSec;
    this.bandwidthUtilPct = Math.min(100,
      Math.round((bpsUsed / this.bandwidthCapacityBps) * 100)
    );

    if (this.processingRate === 0) return;

    const toForward = this._drainByRate(deltaTime);

    for (const packet of toForward) {
      packet.ttl--;
      if (packet.ttl <= 0) {
        packet.status = 'DROPPED';
        this.packetsDropped++;
        packetManager.drop(packet.id);
        continue;
      }

      if (this.id === packet.destination) {
        packet.status = 'DELIVERED';
        this.packetsProcessed++;
        this._bytesForwardedWindow.push({ ts: now, bytes: packet.size });
        packetManager.deliver(packet.id);
        continue;
      }

      const nextLinkId = routingTable.nextHop(this.id, packet.destination);
      if (!nextLinkId) {
        packet.status = 'DROPPED';
        this.packetsDropped++;
        packetManager.drop(packet.id);
        continue;
      }

      const link = linkManager.getLink(nextLinkId);
      if (!link) {
        packet.status = 'DROPPED';
        this.packetsDropped++;
        packetManager.drop(packet.id);
        continue;
      }

      const transmitted = link.transmit(packet);
      if (!transmitted) {
        if (this.queue.length < this.maxQueueDepth) {
          packet.queueEnteredAt = performance.now();
          this.queue.unshift(packet);
        } else {
          this.packetsDropped++;
          packetManager.drop(packet.id);
        }
      } else {
        this.packetsProcessed++;
        this._bytesForwardedWindow.push({ ts: now, bytes: packet.size });
      }
    }
  }

  getQueueingLatency() {
    return this.queue.length * this.processingDelayPerPkt;
  }
}

class LinkEntity {
  constructor(id, from, to, bandwidth, propagationDelay, layer = 'L3') {
    this.id               = id;
    this.from             = from;
    this.to               = to;
    this.bandwidthCapacity  = bandwidth;
    this.propagationDelay   = propagationDelay;
    this.layer              = layer;

    this.packetsInTransit = [];
    this.utilization      = 0;

    this._throughputWindow = [];
    this._WINDOW_MS        = 5000;

    this.totalPackets      = 0;
    this.totalDropped      = 0;
    this.totalBytesCarried = 0;

    this.transmissionDelayMs = Math.round(1000 / Math.max(bandwidth, 1));
  }

  update(deltaTime, nodeManager, packetManager) {
    this.utilization = Math.min(
      this.packetsInTransit.length / Math.max(this.bandwidthCapacity, 1), 1
    );

    const arrived = [];

    for (const entry of this.packetsInTransit) {
      const packet = entry.packet;
      packet.progress += deltaTime / this.propagationDelay;

      if (packet.progress >= 1) {
        packet.progress    = 1;
        packet.hopCount++;
        packet.currentNode = this.to;
        packet.routeHistory.push(this.id);
        packet.status      = 'ARRIVED';
        packet.currentLink = null;

        const targetNode = nodeManager.getNode(this.to);
        if (targetNode) {
          const enqueued = targetNode.enqueue(packet);
          if (!enqueued) {
            this.totalDropped++;
            packetManager.drop(packet.id);
          }
        } else {
          packetManager.deliver(packet.id);
        }

        arrived.push(entry);
        this._throughputWindow.push(performance.now());
        this.totalBytesCarried += packet.size;
      }
    }

    if (arrived.length) {
      this.packetsInTransit = this.packetsInTransit.filter(e => !arrived.includes(e));
    }

    const now = performance.now();
    this._throughputWindow = this._throughputWindow.filter(t => now - t < this._WINDOW_MS);
  }

  transmit(packet) {
    if (this.packetsInTransit.length >= this.bandwidthCapacity) return false;
    packet.status      = 'IN_TRANSIT';
    packet.currentLink = this.id;
    packet.progress    = 0;
    this.packetsInTransit.push({ packet });
    this.totalPackets++;
    return true;
  }

  get throughput() {
    return this._throughputWindow.length / (this._WINDOW_MS / 1000);
  }

  get linkLatencyMs() {
    return (this.propagationDelay * 1000) + this.transmissionDelayMs;
  }
}

class RoutingTable {
  constructor() { this._table = {}; }

  _set(from, dest, linkId) {
    if (!this._table[from]) this._table[from] = {};
    this._table[from][dest] = linkId;
  }

  nextHop(from, dest) {
    return (this._table[from] && this._table[from][dest]) || null;
  }

  build(linkManager) {
    this._table = {};

    const byEndpoints = {};
    for (const link of linkManager.getAll()) {
      byEndpoints[`${link.from}→${link.to}`] = link.id;
    }
    const hop = (from, to) => byEndpoints[`${from}→${to}`] || null;

    const whoH1 = hop('n-who', 'h1');
    const whoH4 = hop('n-who', 'h4');
    const whoH7 = hop('n-who', 'h7');

    if (whoH1) this._set('n-who', 'h1', whoH1);
    if (whoH4) this._set('n-who', 'h4', whoH4);
    if (whoH7) this._set('n-who', 'h7', whoH7);

    if (whoH1) this._set('n-who', 'h8', whoH1);
    if (whoH7) this._set('n-who', 'h9', whoH7);

    const h1H8 = hop('h1', 'h8');
    const h7H9 = hop('h7', 'h9');
    if (h1H8) this._set('h1', 'h8', h1H8);
    if (h7H9) this._set('h7', 'h9', h7H9);

    const h8ToNW  = hop('h8', 'c1');
    const h8ToS   = hop('h8', 'c13');
    const h10ToS  = hop('h10', 'c15');
    const h9ToNE  = hop('h9', 'c7');
    const h9ToS   = hop('h9', 'c17');

    const NW = ['c1','c2','c3','c4','c5','c6'];
    const NE = ['c7','c8','c9','c10','c11','c12'];
    const S  = ['c13','c14','c15','c16','c17','c18','c19','c20'];

    if (h8ToNW) NW.forEach(c => this._set('h8',  c, h8ToNW));
    if (h8ToS)  S.forEach(c  => this._set('h8',  c, h8ToS));
    if (h10ToS) S.forEach(c  => this._set('h10', c, h10ToS));
    if (h9ToNE) NE.forEach(c => this._set('h9',  c, h9ToNE));
    if (h9ToS)  S.forEach(c  => { if (!this._table['h9']?.[c]) this._set('h9', c, h9ToS); });

    if (whoH1) { NW.forEach(c => this._set('n-who', c, whoH1)); }
    if (whoH7) { NE.forEach(c => this._set('n-who', c, whoH7)); }
    if (whoH4) { S.forEach(c  => this._set('n-who', c, whoH4)); }

    if (h1H8) { NW.forEach(c => this._set('h1', c, h1H8)); }
    if (h1H8) { S.forEach(c  => this._set('h1', c, h1H8)); }
    if (h7H9) { NE.forEach(c => this._set('h7', c, h7H9)); }
    if (h7H9) { S.forEach(c  => this._set('h7', c, h7H9)); }

    const h4H10 = hop('h4', 'h10');
    if (h4H10) S.forEach(c => this._set('h4', c, h4H10));
  }
}

class NodeManager {
  constructor() { this.nodes = new Map(); }
  addNode(node) { this.nodes.set(node.id, node); }
  getNode(id)   { return this.nodes.get(id); }
  getAll()      { return [...this.nodes.values()]; }
  update(deltaTime, routingTable, linkManager, packetManager) {
    for (const node of this.nodes.values()) {
      node.update(deltaTime, routingTable, linkManager, packetManager);
    }
  }
}

class LinkManager {
  constructor() { this.links = new Map(); }
  addLink(link) { this.links.set(link.id, link); }
  getLink(id)   { return this.links.get(id); }
  getAll()      { return [...this.links.values()]; }
  update(deltaTime, nodeManager, packetManager) {
    for (const link of this.links.values()) {
      link.update(deltaTime, nodeManager, packetManager);
    }
  }
}

class MetricsEngine {
  constructor(engine) { this._engine = engine; }

  compute() {
    const { nodeManager, linkManager, packetManager } = this._engine;
    const links = linkManager.getAll();
    const nodes = nodeManager.getAll();

    const avgLinkUtil = links.length === 0
      ? 0
      : links.reduce((a, l) => a + l.utilization, 0) / links.length;
    const bandwidthUtilization = Math.round(avgLinkUtil * 100);

    const throughput  = Math.round(packetManager.getThroughput() * 10) / 10;
    const lossRatio   = packetManager.getPacketLossRatio();
    const lossPercent = (lossRatio * 100).toFixed(1);

    let latencyMs = packetManager.getAvgLatencyMs();
    if (latencyMs < 1) {
      const activeLinks = links.filter(l => l.packetsInTransit.length > 0);
      const propDelaySec = activeLinks.length > 0
        ? activeLinks.reduce((a, l) => a + l.propagationDelay, 0)
        : links.reduce((a, l) => a + l.propagationDelay, 0) / Math.max(links.length, 1);
      const totalQueueLatencySec = nodes
        .filter(n => n.type !== 'who')
        .reduce((a, n) => a + n.getQueueingLatency(), 0);
      latencyMs = (propDelaySec + totalQueueLatencySec) * 1000;
    }

    const activePackets  = packetManager.getActiveCount();
    const stats          = packetManager.getStats();
    const droppedTotal   = stats.dropped;

    const dataNs     = nodes.filter(n => n.type !== 'who');
    const avgNodeUtil = dataNs.length === 0 ? 0
      : dataNs.reduce((a, n) => a + n.utilization, 0) / dataNs.length;

    const congestionIndex = dataNs.length === 0 ? 0
      : Math.max(...dataNs.map(n => n.queue.length / n.maxQueueDepth));

    return {
      activePackets,
      latencyMs:           Math.round(latencyMs),
      bandwidthUtilization,
      throughput,
      lossPercent,
      droppedTotal,
      avgNodeUtil:         Math.round(avgNodeUtil * 100),
      congestionIndex:     Math.round(congestionIndex * 100),
    };
  }
}

class SimulationEngineClass {
  constructor() {
    this.nodeManager    = new NodeManager();
    this.linkManager    = new LinkManager();
    this.packetManager  = new PacketManager();
    this.routingTable   = new RoutingTable();
    this.packetRenderer = new PacketRenderer('packetLayer');
    this.metricsEngine  = new MetricsEngine(this);

    this.running   = false;
    this.lastTime  = 0;

    this._spawnAccumulator = 0;
    this._spawnInterval    = 0.3;   // spawn every 300ms (was 480ms) — keeps links busy
    this._speedMultiplier  = 1;
    this._outbreakMode     = false;
  }

  init() {
    this._bootstrapTopology();
    this.running  = true;
    this.lastTime = 0;
    requestAnimationFrame(ts => this._loop(ts));
  }

  _bootstrapTopology() {
    this.nodeManager.addNode(new NodeEntity('n-who', 340, 65, 'who'));
    HOSPITALS.forEach(h => this.nodeManager.addNode(new NodeEntity(h.id, h.x, h.y, 'hospital')));
    CLINICS.forEach(c => this.nodeManager.addNode(new NodeEntity(c.id, c.x, c.y, 'clinic')));

    BASE_ROUTES.forEach((route, i) => {
      const [x1, y1, x2, y2] = route;
      const fromNode = this._findNodeNear(x1, y1);
      const toNode   = this._findNodeNear(x2, y2);
      if (!fromNode || !toNode) return;

      const layer = (fromNode.type === 'who' || toNode.type === 'who')
        ? 'L3'
        : (fromNode.type === 'hospital' && toNode.type === 'hospital') ? 'L2' : 'L3';

      const bw = fromNode.type === 'who' ? 20
        : fromNode.type === 'hospital' ? 12 : 6;

      const delay = this._calcPropagationDelay(x1, y1, x2, y2);

      this.linkManager.addLink(
        new LinkEntity(`l${i + 1}`, fromNode.id, toNode.id, bw, delay, layer)
      );
    });

    this.routingTable.build(this.linkManager);
  }

  _findNodeNear(tx, ty) {
    let best = null, bestDist = Infinity;
    for (const node of this.nodeManager.nodes.values()) {
      const d = Math.hypot(node.x - tx, node.y - ty);
      if (d < bestDist) { bestDist = d; best = node; }
    }
    return bestDist < 25 ? best : null;
  }

  _calcPropagationDelay(x1, y1, x2, y2) {
    // 1 SVG px ≈ 8ms travel → a 200px link takes ~1.6s at speed×1.
    // This keeps packets visibly moving across interconnects.
    const px = Math.hypot(x2 - x1, y2 - y1);
    return Math.max(0.8, px / 125);
  }

  spawnBatch(count = 1) {
    const isEmergency = this._outbreakMode;

    const NW = ['c1','c2','c3','c4','c5','c6'];
    const NE = ['c7','c8','c9','c10','c11','c12'];
    const S  = ['c13','c14','c15','c16','c17','c18','c19','c20'];

    const flows = [
      ...NW.map(c => ['n-who', c]),
      ...NE.map(c => ['n-who', c]),
      ...S.map(c  => ['n-who', c]),
    ];

    for (let i = 0; i < count; i++) {
      const [src, dest] = flows[Math.floor(Math.random() * flows.length)];

      const firstLinkId = this.routingTable.nextHop(src, dest);
      if (!firstLinkId) continue;

      const link = this.linkManager.getLink(firstLinkId);
      if (!link) continue;

      if (link.packetsInTransit.length >= link.bandwidthCapacity) continue;

      const packet = this.packetManager.createPacket({
        source:      src,
        destination: dest,
        size:        isEmergency ? 1024 : 512,
        priority:    isEmergency ? 'HIGH' : 'NORMAL',
        type:        isEmergency ? 'MEDICAL' : 'ADMIN',
        createdAt:   performance.now(),
        ttl:         16,
      });

      packet.color       = isEmergency ? '#E24B4A' : '#1D9E75';
      packet.isEmergency = isEmergency;

      // WHO has processingRate=0 (source-only) — do NOT enqueue there or
      // packets will stall forever. Transmit directly onto the first-hop link.
      link.transmit(packet);
    }
  }

  spawnOutbreakBurst() {
    for (let i = 0; i < 6; i++) this.spawnBatch(1);
  }

  _loop(timestamp) {
    if (!this.running) return;
    if (!this.lastTime) this.lastTime = timestamp;
    const rawDt = Math.min((timestamp - this.lastTime) / 1000, 0.1);
    this.lastTime = timestamp;
    this._update(rawDt);
    requestAnimationFrame(ts => this._loop(ts));
  }

  _update(deltaTime) {
    const dt = deltaTime * this._speedMultiplier;
    this.nodeManager.update(dt, this.routingTable, this.linkManager, this.packetManager);
    this.linkManager.update(dt, this.nodeManager, this.packetManager);

    this._spawnAccumulator += dt;
    const interval = this._outbreakMode
      ? this._spawnInterval * 0.4
      : this._spawnInterval;

    if (this._spawnAccumulator >= interval) {
      const batchSize = this._outbreakMode ? 4 : 2;
      this.spawnBatch(batchSize);
      this._spawnAccumulator = 0;
    }

    this.packetRenderer.render(this.packetManager, this.linkManager, this.nodeManager);
    this._updateDashboard();
  }

  _updateDashboard() {
    const m = this.metricsEngine.compute();
    const set = (id, val) => {
      const el = document.getElementById(id);
      if (el) el.textContent = val;
    };
    set('s-packets',   m.throughput);
    set('s-alerts',    m.droppedTotal);
    set('s-latency',   m.latencyMs + 'ms');
    set('s-bw',        m.bandwidthUtilization + '%');
    set('s-loss',      m.lossPercent + '%');
    set('s-congestion',m.congestionIndex + '%');
    set('s-nodeutil',  m.avgNodeUtil + '%');
    set('s-active',    m.activePackets);
  }

  pause()  { this.running = false; }

  resume() {
    if (!this.running) {
      this.running  = true;
      this.lastTime = 0;
      requestAnimationFrame(ts => this._loop(ts));
    }
  }

  setSpeed(mult)          { this._speedMultiplier = parseFloat(mult) || 1; }
  setOutbreakMode(active) { this._outbreakMode = active; }
}

const SimulationEngine = new SimulationEngineClass();
window.SimulationEngine = SimulationEngine;

// ── Network UI façade ──────────────────────────────────────────────────────

const Network = (() => {
  let paused       = false;
  let outbreakMode = false;
  let logMsgIdx    = 0;

  const SPEED_LABELS = { 0.5:'Slow', 1:'Normal', 2:'Fast', 3:'Turbo' };

  const LOG_MESSAGES = [
    ['INFO', '[L2] CRC check passed — Hospital LAN frame integrity 100%'],
    ['INFO', '[L3] Route update: clinic-cluster-S via Hospital-4 (latency 6ms)'],
    ['WARN', '[L1] Wireless signal degradation at Clinic NW-3 — failover to fiber'],
    ['INFO', '[L2] MAC address table refreshed — 31 active entries'],
    ['INFO', '[L3] WHO BGP keepalive acknowledged by all hospital peers'],
    ['WARN', '[L3] QoS queue depth rising — outbreak data prioritised over admin traffic'],
    ['INFO', '[L1] Satellite uplink WHO Geneva — round-trip 42ms'],
    ['INFO', '[L2] ARP reply received — Clinic NE-4 IP resolved'],
    ['INFO', '[L3] OSPF hello from Hospital-8 (Vienna) — route table updated'],
    ['WARN', '[L2] Duplicate MAC detected in Hospital LAN S — VLAN isolation applied'],
  ];

  function addLog(level, message) {
    const log = document.getElementById('alertLog');
    if (!log) return;
    const now = new Date().toTimeString().split(' ')[0];
    const cls = level === 'CRIT' ? 'log-crit' : level === 'WARN' ? 'log-warn' : 'log-info';
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML =
      `<span class="log-time">${now}</span>` +
      `<span class="${cls}">[${level}] ${message}</span>`;
    log.appendChild(entry);
    while (log.children.length > 80) log.removeChild(log.firstChild);
    log.scrollTop = log.scrollHeight;
  }

  function _checkCongestionAlerts() {
    const nodes = SimulationEngine.nodeManager.getAll();
    for (const node of nodes) {
      const fillRatio = node.queue.length / node.maxQueueDepth;
      if (fillRatio > 0.85 && node.packetsDropped > 0) {
        const label = node.type === 'hospital'
          ? HOSPITALS.find(h => h.id === node.id)?.name || node.id
          : node.id;
        addLog('WARN', `[L3] Queue congestion at ${label}: ${node.queue.length}/${node.maxQueueDepth} — dropping packets`);
      }
    }
  }

  function showInfo(title, badge, body, color) {
    const tt = document.getElementById('tooltip');
    if (!tt) return;
    document.getElementById('tt-title').textContent = title;
    document.getElementById('tt-body').textContent  = body;
    const badgeEl = document.getElementById('tt-badge');
    badgeEl.textContent  = badge;
    badgeEl.style.cssText = `background:${color}22;color:${color};border:0.5px solid ${color}55;`;
    tt.classList.remove('hidden');
  }

  function setLayer(value) {
    ['L1','L2','L3'].forEach(l => {
      const el = document.getElementById('layer' + l);
      if (el) el.style.opacity = (value === l || value === 'all') ? '1' : '0.1';
    });
    const sel = document.getElementById('layerSel');
    if (sel) sel.value = value;
    document.querySelectorAll('.tab-btn').forEach(btn => {
      const t   = btn.textContent.trim();
      const map = { 'All Layers':'all','L3 Network':'L3','L2 Data Link':'L2','L1 Physical':'L1' };
      if (Object.keys(map).includes(t)) btn.classList.toggle('active', map[t] === value);
    });
    addLog('INFO', `Layer focus → ${value === 'all' ? 'All layers' : value}`);
  }

  function triggerOutbreak() {
    outbreakMode = !outbreakMode;
    SimulationEngine.setOutbreakMode(outbreakMode);

    const dot       = document.getElementById('statusDot');
    const label     = document.getElementById('statusLabel');
    const whoNode   = document.getElementById('n-who');
    const whoCircle = whoNode ? whoNode.querySelector('circle') : null;
    const btn       = document.getElementById('outbreakBtn');

    if (outbreakMode) {
      if (dot)   dot.className   = 'status-dot outbreak';
      if (label) { label.className = 'status-label outbreak'; label.textContent = 'OUTBREAK'; }
      if (whoCircle) { whoCircle.setAttribute('stroke','#E24B4A'); whoCircle.setAttribute('stroke-width','3'); }
      if (btn)   btn.classList.add('active-outbreak');
      addLog('CRIT', 'Epidemic threshold exceeded — emergency routing ACTIVATED');
      addLog('WARN', 'BGP priority queues: CRITICAL traffic pre-empting normal flows');
      addLog('CRIT', 'WHO GOARN alert broadcast to all 10 hospitals + 20 clinics');
      addLog('WARN', 'Emergency bandwidth allocated on all L1 physical links');
      SimulationEngine.spawnOutbreakBurst();
    } else {
      if (dot)   dot.className   = 'status-dot active';
      if (label) { label.className = 'status-label live'; label.textContent = 'LIVE'; }
      if (whoCircle) { whoCircle.setAttribute('stroke','#1D9E75'); whoCircle.setAttribute('stroke-width','1.8'); }
      if (btn)   btn.classList.remove('active-outbreak');
      addLog('INFO', 'Outbreak condition cleared — normal routing resumed');
    }
  }

  function togglePause() {
    paused = !paused;
    paused ? SimulationEngine.pause() : SimulationEngine.resume();
    const pauseBtn = document.getElementById('pauseBtn');
    if (pauseBtn) pauseBtn.textContent = paused ? '▶ Resume' : '⏸ Pause';
    addLog('INFO', paused ? 'Simulation paused' : 'Simulation resumed');
  }

  function setSpeed(value) {
    const mult = parseFloat(value);
    SimulationEngine.setSpeed(mult);
    const lbl = document.getElementById('speedLabel');
    if (lbl) lbl.textContent = SPEED_LABELS[mult] || 'Normal';
  }

  function _startPeriodicLog() {
    setInterval(() => {
      if (!paused) {
        const msg = LOG_MESSAGES[logMsgIdx++ % LOG_MESSAGES.length];
        addLog(msg[0], msg[1]);
      }
    }, 3800);

    setInterval(() => {
      if (!paused) _checkCongestionAlerts();
    }, 4000);

    setInterval(() => {
      if (!paused) {
        const m = SimulationEngine.metricsEngine.compute();
        addLog('INFO',
          `[METRICS] Throughput: ${m.throughput} pkt/s · Latency: ${m.latencyMs}ms · ` +
          `Loss: ${m.lossPercent}% · BW util: ${m.bandwidthUtilization}% · ` +
          `Congestion idx: ${m.congestionIndex}%`
        );
      }
    }, 8000);
  }

  function init() {
    addLog('INFO', 'L1 Physical: fiber / satellite links online — 31 nodes reachable');
    addLog('INFO', 'L2 Data Link: ARP tables populated, VLANs segmented (Clinical/Admin/IoT)');
    addLog('INFO', 'L3 Network: BGP routing converged — WHO → Hospital → Clinic paths active');
    addLog('INFO', 'SimEngine: real formulas active — latency, throughput, loss, congestion');
    SimulationEngine.init();
    _startPeriodicLog();
  }

  return { init, showInfo, setLayer, triggerOutbreak, togglePause, setSpeed };
})();

window.Network = Network;
  </script>

  <script>
'use strict';

function setLayer(value)   { Network.setLayer(value); }
function triggerOutbreak() { Network.triggerOutbreak(); }
function togglePause()     { Network.togglePause(); }
function setSpeed(value)   { Network.setSpeed(value); }

window.addEventListener('DOMContentLoaded', () => {

  buildHospitals();
  buildClinics();

  document.addEventListener('click', e => {
    const tt = document.getElementById('tooltip');
    if (!tt) return;
    if (!tt.classList.contains('hidden') && !tt.contains(e.target)) {
      if (!e.target.closest('.node-group')) tt.classList.add('hidden');
    }
  });

  document.addEventListener('keydown', e => {
    if ((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('node-group')) {
      e.preventDefault();
      e.target.click();
    }
  });

  // Speed slider: range 1-4 → multipliers 0.5 / 1 / 2 / 3
  const speedCtrl = document.getElementById('speedCtrl');
  if (speedCtrl) {
    const SPEED_MAP = { 1: 0.5, 2: 1, 3: 2, 4: 3 };
    speedCtrl.addEventListener('input', e => {
      const mult = SPEED_MAP[e.target.value] || 1;
      setSpeed(mult);
    });
  }

  Network.init();
});
  </script>
